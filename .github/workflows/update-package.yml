name: Update Package.swift

on:
  repository_dispatch:
    types: [update-package]
  workflow_dispatch:
    inputs:
      version:
        description: 'Koog version tag (e.g. 0.7.0)'
        required: true
      url:
        description: 'URL of the XCFramework zip'
        required: true
      checksum:
        description: 'SHA-256 checksum of the XCFramework zip'
        required: true

jobs:
  update-package:
    name: Update Package.swift
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'repository_dispatch' &&
       github.event.sender.login == 'koog-spm-release[bot]')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v6

      - name: Resolve inputs
        env:
          PAYLOAD_VERSION: ${{ github.event.client_payload.version }}
          PAYLOAD_URL: ${{ github.event.client_payload.url }}
          PAYLOAD_CHECKSUM: ${{ github.event.client_payload.checksum }}
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_URL: ${{ inputs.url }}
          INPUT_CHECKSUM: ${{ inputs.checksum }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [[ "$EVENT_NAME" == 'repository_dispatch' ]]; then
            version="$PAYLOAD_VERSION"
            url="$PAYLOAD_URL"
            checksum="$PAYLOAD_CHECKSUM"
          else
            version="$INPUT_VERSION"
            url="$INPUT_URL"
            checksum="$INPUT_CHECKSUM"
          fi
          if [[ -z "$version" || -z "$url" || -z "$checksum" ]]; then
            echo "Missing required inputs. Provide version, url, checksum." >&2
            exit 1
          fi
          {
            echo "VERSION=$version"
            echo "URL=$url"
            echo "CHECKSUM=$checksum"
          } >> "$GITHUB_ENV"

      - name: Validate inputs
        run: |
          version="$VERSION"
          url="$URL"
          semver_regex='^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?(\+[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?$'
          if [[ ! "$version" =~ $semver_regex ]]; then
            echo "Invalid version '$version'. Must be SemVer 2.0.0 without a leading 'v'." >&2
            exit 1
          fi
          if [[ "$url" != https://github.com/JetBrains/koog/releases/download/* ]]; then
            echo "Invalid URL '$url'. Must start with https://github.com/JetBrains/koog/releases/download/." >&2
            exit 1
          fi

      - name: Fail if tag exists
        run: |
          git fetch --tags --quiet
          if git rev-parse -q --verify "refs/tags/$VERSION"; then
            echo "Tag '$VERSION' already exists." >&2
            exit 1
          fi

      - name: Fail if branch exists
        run: |
          if git ls-remote --exit-code origin "refs/heads/release/$VERSION" > /dev/null 2>&1; then
            echo "Branch 'release/$VERSION' already exists." >&2
            exit 1
          fi

      - name: Generate Package.swift
        run: |
          cat > Package.swift << 'EOF'
          // swift-tools-version:5.9
          import PackageDescription

          let package = Package(
              name: "Koog",
              platforms: [
                  .iOS(.v13),
              ],
              products: [
                  .library(
                      name: "Koog",
                      targets: ["Koog"]
                  ),
              ],
              targets: [
                  .binaryTarget(
                      name: "Koog",
                      url: "${{ env.URL }}",
                      checksum: "${{ env.CHECKSUM }}"
                  ),
              ]
          )
          EOF

      - name: Create branch and open PR
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "release/$VERSION"
          git add Package.swift
          git commit -m "release: update Package.swift for $VERSION"
          git push origin "release/$VERSION"
          gh pr create \
            --title "release: update Package.swift for $VERSION" \
            --body "Automated update of \`Package.swift\` for Koog **$VERSION**.

See upstream release: https://github.com/JetBrains/koog/releases/tag/$VERSION" \
            --base main \
            --head "release/$VERSION"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
