name: Tag Release

on:
  pull_request:
    types: [closed]
    branches:
      - main

jobs:
  tag-release:
    name: Tag Release
    if: github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'release/')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - name: Extract version
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          version="${HEAD_REF#release/}"
          semver_regex='^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?(\+[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?$'
          if [[ ! "$version" =~ $semver_regex ]]; then
            echo "Branch name does not encode a valid SemVer version: '$version'" >&2
            exit 1
          fi
          echo "VERSION=$version" >> "$GITHUB_ENV"

      - name: Fail if tag exists
        run: |
          git fetch --tags --quiet
          if git rev-parse -q --verify "refs/tags/$VERSION"; then
            echo "Tag '$VERSION' already exists." >&2
            exit 1
          fi

      - name: Create release
        run: |
          gh release create "$VERSION" \
            --title "$VERSION" \
            --notes "See the Koog release: https://github.com/JetBrains/koog/releases/tag/$VERSION"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
